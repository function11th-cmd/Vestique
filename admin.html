<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Security Headers -->
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://www.gstatic.com; img-src 'self' https: data:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://www.gstatic.com https://*.firebaseapp.com https://api.cloudinary.com; frame-src 'self';">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="X-Frame-Options" content="DENY">
  <meta http-equiv="X-XSS-Protection" content="1; mode=block">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <title>Admin — Vestique</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    .gate { min-height:100vh; display:flex; align-items:center; justify-content:center; background:#0a0a0a; }
    .gate-box { background:#fafafa; padding:60px; width:100%; max-width:400px; text-align:center; }
    .gate-box h2 { font-family:'Playfair Display',serif; font-size:2rem; font-weight:400; margin-bottom:6px; color:#c8a97e; }
    .gate-box p { color:#6b6b6b; font-size:0.85rem; margin-bottom:40px; letter-spacing:1px; text-transform:uppercase; }
    .gate-box input { width:100%; padding:14px 0; border:none; border-bottom:1px solid #e8e4e0; background:transparent; font-family:'DM Sans',sans-serif; font-size:0.95rem; margin-bottom:30px; outline:none; text-align:center; letter-spacing:1px; transition:border-color 0.3s; }
    .gate-box input:focus { border-bottom-color:#0a0a0a; }
    .gate-box input:disabled { opacity:0.5; }
    .gate-box button { width:100%; padding:16px; background:#0a0a0a; color:white; border:none; font-family:'DM Sans',sans-serif; font-size:0.85rem; letter-spacing:3px; text-transform:uppercase; cursor:pointer; transition:all 0.3s; }
    .gate-box button:hover:not(:disabled) { background:#c8a97e; color:#0a0a0a; }
    .gate-box button:disabled { opacity:0.6; cursor:not-allowed; }
    .gate-error { display:none; color:#c0392b; font-size:0.8rem; margin-top:14px; letter-spacing:1px; }
    .admin-panel { display:none; }
    .admin-wrapper { max-width:1100px; margin:0 auto; padding:60px 30px; display:grid; grid-template-columns:380px 1fr; gap:50px; align-items:start; }
    .drag-drop-active { background: #f0e8e0 !important; border-color: #c8a97e !important; }
    .admin-title { font-family:'Playfair Display',serif; font-size:2.5rem; font-weight:400; padding:60px 30px 0; max-width:1100px; margin:0 auto; letter-spacing:1px; display:flex; justify-content:space-between; align-items:flex-end; }
    .logout-btn { font-family:'DM Sans',sans-serif; font-size:0.75rem; letter-spacing:2px; text-transform:uppercase; background:none; border:none; color:#6b6b6b; cursor:pointer; padding-bottom:8px; transition:color 0.2s; }
    .logout-btn:hover { color:#c0392b; }
    .admin-divider { border:none; border-top:1px solid #e8e4e0; max-width:1100px; margin:20px auto 0; }
    .add-product-panel { background:#fafafa; padding:40px; position:sticky; top:90px; }
    .add-product-panel h3 { font-family:'Playfair Display',serif; font-size:1.4rem; font-weight:400; margin-bottom:30px; letter-spacing:1px; }
    .form-group { margin-bottom:24px; }
    .form-group label { display:block; font-size:0.75rem; letter-spacing:2px; text-transform:uppercase; color:#6b6b6b; margin-bottom:8px; }
    .form-group input, .form-group textarea { width:100%; padding:12px 0; border:none; border-bottom:1px solid #e8e4e0; background:transparent; font-family:'DM Sans',sans-serif; font-size:0.95rem; outline:none; transition:border-color 0.3s; color:#0a0a0a; }
    .form-group input:focus, .form-group textarea:focus { border-bottom-color:#0a0a0a; }
    .form-group textarea { resize:none; height:70px; }
    .price-input-wrap { position:relative; }
    .price-input-wrap span { position:absolute; left:0; top:12px; font-size:0.95rem; color:#c8a97e; font-weight:500; }
    .price-input-wrap input { padding-left:20px; }
    .image-preview { width:100%; height:160px; background:#e8e4e0; display:flex; align-items:center; justify-content:center; margin-bottom:24px; overflow:hidden; }
    .image-preview img { width:100%; height:100%; object-fit:cover; display:none; }
    .image-preview span { font-size:0.8rem; color:#6b6b6b; letter-spacing:1px; }
    .add-btn { width:100%; padding:16px; background:#0a0a0a; color:white; border:none; font-family:'DM Sans',sans-serif; font-size:0.85rem; letter-spacing:3px; text-transform:uppercase; cursor:pointer; transition:all 0.3s; }
    .add-btn:hover { background:#c8a97e; color:#0a0a0a; }
    .success-msg { display:none; text-align:center; padding:12px; background:#f0f7f0; color:#2d7a2d; font-size:0.85rem; letter-spacing:1px; margin-top:12px; }
    .products-panel h3 { font-family:'Playfair Display',serif; font-size:1.4rem; font-weight:400; margin-bottom:24px; letter-spacing:1px; display:flex; justify-content:space-between; align-items:center; }
    .product-count { font-family:'DM Sans',sans-serif; font-size:0.85rem; color:#6b6b6b; font-weight:400; }
    .admin-products-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(200px, 1fr)); gap:20px; }
    .admin-product-card { background:white; position:relative; animation:fadeUp 0.4s ease forwards; opacity:0; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    .admin-product-card img { width:100%; height:180px; object-fit:cover; background:#e8e4e0; display:block; }
    .admin-product-card-info { padding:16px; }
    .admin-product-card-info h4 { font-family:'Playfair Display',serif; font-size:1rem; font-weight:400; margin-bottom:4px; }
    .admin-product-card-info .price { color:#c8a97e; font-size:0.95rem; font-weight:500; }
    .admin-product-card-info .desc  { color:#6b6b6b; font-size:0.8rem; margin-top:4px; }
    .delete-btn { position:absolute; top:10px; right:10px; width:30px; height:30px; background:#c0392b; color:white; border:none; cursor:pointer; font-size:1rem; display:flex; align-items:center; justify-content:center; transition:background 0.2s; }
    .delete-btn:hover { background:#0a0a0a; }
    .empty-products { grid-column:1/-1; text-align:center; padding:60px 20px; color:#6b6b6b; font-size:0.9rem; border:1px dashed #e8e4e0; }
    .loading-msg { grid-column:1/-1; text-align:center; padding:40px; color:#6b6b6b; }
    @media (max-width:768px) { .admin-wrapper { grid-template-columns:1fr; } }
  </style>
</head>
<body>

  <!-- LOGIN GATE -->
  <div class="gate" id="gate">
    <div class="gate-box">
      <h2>Vestique</h2>
      <p>Verifying Admin Access</p>
      <button id="gate-btn" onclick="goToLogin()">Continue To Login</button>
      <p class="gate-error" id="gate-error">Admin access required. Please sign in with an admin account.</p>
    </div>
  </div>

  <!-- ADMIN PANEL -->
  <template id="admin-panel-template">
  <div class="admin-panel" id="admin-panel">
    <header class="mobile-nav">
      <h2>Vestique</h2>
      <button class="hamburger" id="hamburger-btn" aria-label="Toggle navigation menu" aria-controls="main-nav" aria-expanded="false">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <nav id="main-nav">
        <a href="index.html">Home</a>
        <a href="products.html">Products</a>
        <a href="cart.html">Cart</a>
        <a href="login.html">Login</a>
        <a href="admin.html" style="color:#c8a97e">Admin</a>
      </nav>
    </header>

    <div class="admin-title">
      Admin Panel
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
    <hr class="admin-divider">

    <div class="admin-wrapper">
      <!-- ADD PRODUCT -->
      <div class="add-product-panel">
        <h3>Add New Product</h3>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 24px;">
          <div style="text-align: center;">
            <p style="font-size: 0.75rem; letter-spacing: 1px; text-transform: uppercase; color: #6b6b6b; margin-bottom: 8px;">Front Image</p>
            <div class="image-preview" id="image-preview">
              <img id="preview-img" src="" alt="Preview">
              <span id="preview-placeholder">Upload front image</span>
            </div>
          </div>
          <div style="text-align: center;">
            <p style="font-size: 0.75rem; letter-spacing: 1px; text-transform: uppercase; color: #6b6b6b; margin-bottom: 8px;">Back Image (Optional)</p>
            <div class="image-preview" id="image-preview-back">
              <img id="preview-img-back" src="" alt="Back Preview">
              <span id="preview-placeholder-back">Upload back image</span>
            </div>
          </div>
        </div>
        <div class="form-group">
          <label>Product Name</label>
          <input type="text" id="prod-name" placeholder="e.g. Black Hoodie">
        </div>
        <div class="form-group">
          <label>Price (₹)</label>
          <div class="price-input-wrap">
            <span>₹</span>
            <input type="number" id="prod-price" placeholder="999" min="0">
          </div>
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea id="prod-desc" placeholder="Short product description..."></textarea>
        </div>
        <div class="form-group">
          <label>Stock Quantity</label>
          <input type="number" id="prod-stock" placeholder="e.g. 50" min="0">
        </div>
        <div class="form-group">
          <label>Category (Sport)</label>
          <select id="prod-category" style="width:100%; padding:12px 0; border:none; border-bottom:1px solid #e8e4e0; background:transparent; font-family:'DM Sans',sans-serif; font-size:0.95rem; outline:none; transition:border-color 0.3s; color:#0a0a0a; cursor:pointer;">
            <option value="">-- Select Category --</option>
            <option value="football">⚽ Football</option>
            <option value="cricket">🏏 Cricket</option>
            <option value="basketball">🏀 Basketball</option>
            <option value="shorts">🩳 Shorts</option>
          </select>
        </div>
        <div class="form-group">
          <label>Front Image (Drag & Drop)</label>
          <div id="drag-drop-area" style="border: 2px dashed #e8e4e0; padding: 30px; text-align: center; cursor: pointer; border-radius: 4px; background: #f9f8f7; transition: all 0.3s;">
            <p style="margin: 0; color: #6b6b6b; font-size: 0.9rem;">Drag & drop image here or click to select</p>
            <input type="file" id="image-file-input" accept="image/*" style="display: none;">
          </div>
          <div id="upload-progress" style="display: none; margin-top: 12px;">
            <div style="background: #e8e4e0; height: 4px; border-radius: 2px; overflow: hidden;">
              <div id="progress-bar" style="background: #c8a97e; height: 100%; width: 0%; transition: width 0.3s;"></div>
            </div>
            <p id="progress-text" style="font-size: 0.8rem; color: #6b6b6b; margin-top: 8px; text-align: center;">Uploading...</p>
          </div>
          <input type="hidden" id="prod-image">
        </div>

        <div class="form-group">
          <label>Back Image (Drag & Drop) — Optional</label>
          <div id="drag-drop-area-back" style="border: 2px dashed #e8e4e0; padding: 30px; text-align: center; cursor: pointer; border-radius: 4px; background: #f9f8f7; transition: all 0.3s;">
            <p style="margin: 0; color: #6b6b6b; font-size: 0.9rem;">Drag & drop back image here or click to select</p>
            <input type="file" id="image-file-input-back" accept="image/*" style="display: none;">
          </div>
          <div id="upload-progress-back" style="display: none; margin-top: 12px;">
            <div style="background: #e8e4e0; height: 4px; border-radius: 2px; overflow: hidden;">
              <div id="progress-bar-back" style="background: #c8a97e; height: 100%; width: 0%; transition: width 0.3s;"></div>
            </div>
            <p id="progress-text-back" style="font-size: 0.8rem; color: #6b6b6b; margin-top: 8px; text-align: center;">Uploading...</p>
          </div>
          <input type="hidden" id="prod-image-back">
        </div>
        <button class="add-btn" onclick="addProduct()">+ Add Product</button>
        <div class="success-msg" id="success-msg">✓ Product added successfully!</div>
      </div>

      <!-- PRODUCTS LIST -->
      <div class="products-panel">
        <h3>
          All Products
          <span class="product-count" id="product-count">0 products</span>
        </h3>
        <div class="admin-products-grid" id="admin-products-grid">
          <div class="loading-msg">Loading products...</div>
        </div>
      </div>
    </div>

    <!-- ORDERS -->
    <div style="max-width:1100px; margin:0 auto; padding:0 30px 80px;">
      <div style="border-top:1px solid #e8e4e0; padding-top:50px;">
        <h3 style="font-family:'Playfair Display',serif; font-size:1.8rem; font-weight:400; margin-bottom:8px; letter-spacing:1px;">All Orders</h3>
        <p style="color:#6b6b6b; font-size:0.85rem; margin-bottom:30px;">Update order statuses — changes show instantly on customer dashboard</p>
        <div id="all-orders-list"></div>
        <div id="no-orders-msg" style="text-align:center; padding:60px 20px; border:1px dashed #e8e4e0; color:#6b6b6b; display:none;">No orders yet</div>
      </div>
    </div>
  </div>
  </template>

  <script type="module">
    import { initializeApp }   from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import {
      getFirestore, collection, addDoc, deleteDoc,
      doc, getDoc, onSnapshot, updateDoc
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import {
      getAuth,
      signOut,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    /* ─── Init ───────────────────────────────────────────────────── */
    const firebaseConfig = {
      apiKey: "AIzaSyBPqTTmRHkNffvsrP6iVteokpxJ5xzQkqw",
      authDomain: "vestique-d6b6f.firebaseapp.com",
      projectId: "vestique-d6b6f",
      storageBucket: "vestique-d6b6f.firebasestorage.app",
      messagingSenderId: "517893374274",
      appId: "1:517893374274:web:fe371519fba987cee4c8db"
    };

    const app  = initializeApp(firebaseConfig);
    const db   = getFirestore(app);
    const auth = getAuth(app);

    let adminPanelMounted = false;

    function setupAdminNav() {
      const nav = document.getElementById('main-nav');
      const hamburger = document.getElementById('hamburger-btn');
      if (!nav || !hamburger) return;

      function closeMenu() {
        nav.classList.remove('open');
        hamburger.classList.remove('open');
        hamburger.setAttribute('aria-expanded', 'false');
      }

      hamburger.addEventListener('click', function () {
        const isOpen = nav.classList.toggle('open');
        hamburger.classList.toggle('open', isOpen);
        hamburger.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
      });

      nav.querySelectorAll('a').forEach(function (link) {
        link.addEventListener('click', closeMenu);
      });

      window.addEventListener('resize', function () {
        if (window.innerWidth > 768) closeMenu();
      });
    }

    function mountAdminPanel() {
      if (adminPanelMounted) return;
      const template = document.getElementById('admin-panel-template');
      if (!template) return;
      document.body.appendChild(template.content.cloneNode(true));
      adminPanelMounted = true;
      setupAdminNav();
      setupDragDrop();
    }

    function redirectToLogin(reason = 'auth_required') {
      const next = encodeURIComponent('admin.html');
      window.location.replace(`login.html?next=${next}&reason=${encodeURIComponent(reason)}`);
    }

    window.goToLogin = function() {
      redirectToLogin('auth_required');
    };

    /* ─── Auth state listener — auto-restores session on page reload ─ */
    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        redirectToLogin('auth_required');
        return;
      }

      const adminSnap = await getDoc(doc(db, 'admins', user.email));
      if (adminSnap.exists()) {
        showPanel();
        return;
      }

      await signOut(auth);
      redirectToLogin('not_admin');
    });

    function showPanel() {
      mountAdminPanel();
      document.getElementById('gate').style.display        = 'none';
      const adminPanel = document.getElementById('admin-panel');
      if (adminPanel) adminPanel.style.display = 'block';
      loadProducts();
      loadOrders();
    }

    function showGate() {
      document.getElementById('gate').style.display        = 'flex';
      const adminPanel = document.getElementById('admin-panel');
      if (adminPanel) adminPanel.style.display = 'none';
    }

    /* ─── Logout ─────────────────────────────────────────────────── */
    window.logout = async function() {
      await signOut(auth);
      redirectToLogin('signed_out');
    };

    /* ─── Products ───────────────────────────────────────────────── */
    // SECURITY NOTE: Direct Cloudinary uploads are disabled for security.
    // Image uploads must go through a secure backend endpoint that:
    // 1. Validates admin authorization (not just client-side)
    // 2. Validates file type and size server-side
    // 3. Scans for malicious content
    // 4. Uses server-side Cloudinary auth (API secret, never exposed to client)
    //
    // To implement securely:
    // Option 1: Use Firebase Cloud Functions with Cloudinary SDK
    // Option 2: Use Firebase Cloud Storage (recommended)
    // Option 3: Deploy a backend service (Node.js, Python, etc.)
    //
    // See: docs/SECURE_UPLOADS.md for implementation guide

    const BACKEND_UPLOAD_ENDPOINT = '/api/upload'; // Configure in .env
    const MAX_IMAGE_SIZE_BYTES = 5 * 1024 * 1024; // 5MB
    const ALLOWED_IMAGE_TYPES = ['image/jpeg', 'image/png', 'image/webp', 'image/avif'];

    window.previewImage = function(imageType = 'front') {
      if (imageType === 'front') {
        const url         = document.getElementById('prod-image').value;
        const img         = document.getElementById('preview-img');
        const placeholder = document.getElementById('preview-placeholder');
        if (url) { img.src = url; img.style.display = 'block'; placeholder.style.display = 'none'; }
        else     { img.style.display = 'none'; placeholder.style.display = 'block'; }
      } else {
        const url         = document.getElementById('prod-image-back').value;
        const img         = document.getElementById('preview-img-back');
        const placeholder = document.getElementById('preview-placeholder-back');
        if (url) { img.src = url; img.style.display = 'block'; placeholder.style.display = 'none'; }
        else     { img.style.display = 'none'; placeholder.style.display = 'block'; }
      }
    };

    /**
     * Upload image through secure backend endpoint.
     * Backend should validate auth, file type, size, and return signed URL.
     */
    async function uploadToBackend(file, imageType = 'front') {
      // Validate file before sending
      if (!ALLOWED_IMAGE_TYPES.includes(file.type)) {
        throw new Error('Only JPEG, PNG, WebP, and AVIF images are allowed');
      }

      if (file.size > MAX_IMAGE_SIZE_BYTES) {
        throw new Error(`Image size must be under ${MAX_IMAGE_SIZE_BYTES / 1024 / 1024}MB`);
      }

      const formData = new FormData();
      formData.append('file', file);
      formData.append('imageType', imageType);

      try {
        const progressId = imageType === 'front' ? 'upload-progress' : 'upload-progress-back';
        const progressEl = document.getElementById(progressId);
        if (progressEl) progressEl.style.display = 'block';

        // Get auth token for backend validation
        const token = await auth.currentUser?.getIdToken();
        
        const response = await fetch(BACKEND_UPLOAD_ENDPOINT, {
          method: 'POST',
          body: formData,
          headers: {
            'Authorization': token ? `Bearer ${token}` : '',
          }
        });

        if (!response.ok) {
          const errorData = await response.json().catch(() => ({}));
          throw new Error(errorData.error || `Upload failed (${response.status})`);
        }

        const data = await response.json();
        if (progressEl) progressEl.style.display = 'none';

        if (!data.url) throw new Error('No URL in response');
        return data.url;
      } catch (e) {
        console.error(`Upload error for ${imageType}:`, e);
        const progressId = imageType === 'front' ? 'upload-progress' : 'upload-progress-back';
        const progressEl = document.getElementById(progressId);
        if (progressEl) progressEl.style.display = 'none';
        throw e;
      }
    }

    // Setup drag & drop for both images
    function setupDragDrop() {
      setupDragDropArea('drag-drop-area', 'image-file-input', 'front');
      setupDragDropArea('drag-drop-area-back', 'image-file-input-back', 'back');
    }

    function setupDragDropArea(areaId, inputId, imageType) {
      const dragArea = document.getElementById(areaId);
      const fileInput = document.getElementById(inputId);

      if (!dragArea || !fileInput) return;

      dragArea.addEventListener('click', () => fileInput.click());

      dragArea.addEventListener('dragover', (e) => {
        e.preventDefault();
        dragArea.classList.add('drag-drop-active');
      });

      dragArea.addEventListener('dragleave', () => {
        dragArea.classList.remove('drag-drop-active');
      });

      dragArea.addEventListener('drop', async (e) => {
        e.preventDefault();
        dragArea.classList.remove('drag-drop-active');
        const files = e.dataTransfer.files;
        if (files.length > 0) {
          await handleImageUpload(files[0], imageType);
        }
      });

      fileInput.addEventListener('change', async (e) => {
        if (e.target.files.length > 0) {
          await handleImageUpload(e.target.files[0], imageType);
        }
      });
    }

    // Handle image upload
    async function handleImageUpload(file, imageType = 'front') {
      try {
        const url = await uploadToBackend(file, imageType);
        if (url) {
          if (imageType === 'front') {
            document.getElementById('prod-image').value = url;
            previewImage('front');
          } else {
            document.getElementById('prod-image-back').value = url;
            previewImage('back');
          }
        }
      } catch (e) {
        showValidationError(`Image upload failed: ${e.message}`);
      }
    }

    window.addProduct = async function() {
      // Validate all inputs
      const nameValidation = VALIDATORS.productName(document.getElementById('prod-name').value);
      if (!nameValidation.valid) {
        showValidationError(nameValidation.error);
        return;
      }

      const priceValidation = VALIDATORS.price(document.getElementById('prod-price').value);
      if (!priceValidation.valid) {
        showValidationError(priceValidation.error);
        return;
      }

      const descValidation = VALIDATORS.description(document.getElementById('prod-desc').value);
      if (!descValidation.valid) {
        showValidationError(descValidation.error);
        return;
      }

      const stockValidation = VALIDATORS.stock(document.getElementById('prod-stock').value);
      if (!stockValidation.valid) {
        showValidationError(stockValidation.error);
        return;
      }

      const categoryValue = document.getElementById('prod-category').value.trim();
      const categoryValidation = VALIDATORS.category(categoryValue, ['football', 'cricket', 'basketball', 'shorts']);
      if (!categoryValidation.valid) {
        showValidationError(categoryValidation.error);
        return;
      }

      const imageValidation = VALIDATORS.imageUrl(document.getElementById('prod-image').value);
      if (!imageValidation.valid) {
        showValidationError(imageValidation.error);
        return;
      }

      const imageBack = document.getElementById('prod-image-back').value.trim();
      if (imageBack) {
        const imageBackValidation = VALIDATORS.imageUrl(imageBack);
        if (!imageBackValidation.valid) {
          showValidationError('Back image: ' + imageBackValidation.error);
          return;
        }
      }

      try {
        await addDoc(collection(db, 'products'), {
          name: nameValidation.value,
          price: priceValidation.value,
          desc: descValidation.value,
          image: imageValidation.value,
          imageBack: imageBack,
          stock: stockValidation.value,
          category: categoryValidation.value,
          status: stockValidation.value > 0 ? 'in-stock' : 'out-of-stock',
          createdAt: Date.now()
        });

        const msg = document.getElementById('success-msg');
        msg.style.display = 'block';
        setTimeout(() => msg.style.display = 'none', 3000);

        ['prod-name','prod-price','prod-desc','prod-image','prod-image-back','prod-stock','prod-category']
          .forEach(id => document.getElementById(id).value = '');
        document.getElementById('preview-img').style.display         = 'none';
        document.getElementById('preview-placeholder').style.display = 'block';
        document.getElementById('preview-img-back').style.display         = 'none';
        document.getElementById('preview-placeholder-back').style.display = 'block';
      } catch(e) {
        showValidationError('Error adding product: ' + e.message);
      }
    };

    function loadProducts() {
      const grid = document.getElementById('admin-products-grid');
      grid.innerHTML = '<div class="loading-msg">Loading products...</div>';

      onSnapshot(collection(db, 'products'), (snapshot) => {
        grid.innerHTML = '';
        if (snapshot.empty) {
          grid.innerHTML = '<div class="empty-products">No products yet. Add your first product!</div>';
          document.getElementById('product-count').textContent = '0 products';
          return;
        }

        snapshot.forEach(docSnap => {
          const p    = { id: docSnap.id, ...docSnap.data() };
          const card = document.createElement('div');
          card.className = 'admin-product-card';

          // Use textContent for name/price/desc to prevent XSS
          const img = document.createElement('img');
          img.src = p.image;
          img.alt = p.name;
          img.onerror = () => img.src = 'https://placehold.co/200x300';

          const info = document.createElement('div');
          info.className = 'admin-product-card-info';

          const h4 = document.createElement('h4');
          h4.textContent = p.name;

          const pPrice = document.createElement('p');
          pPrice.className = 'price';
          pPrice.textContent = '₹' + p.price;

          info.appendChild(h4);
          info.appendChild(pPrice);

          if (p.desc) {
            const pDesc = document.createElement('p');
            pDesc.className = 'desc';
            pDesc.textContent = p.desc;
            info.appendChild(pDesc);
          }

          const pStock = document.createElement('p');
          pStock.className = 'desc';
          pStock.style.marginTop = '8px';
          pStock.style.color = p.stock > 0 ? '#2d7a2d' : '#c0392b';
          pStock.textContent = `Stock: ${p.stock || 0}${p.stock === 0 ? ' (Out of Stock)' : ''}`;
          info.appendChild(pStock);

          const delBtn = document.createElement('button');
          delBtn.className = 'delete-btn';
          delBtn.title = 'Delete';
          delBtn.textContent = '✕';
          delBtn.onclick = () => deleteProduct(p.id);

          card.appendChild(img);
          card.appendChild(info);
          card.appendChild(delBtn);
          grid.appendChild(card);
        });

        const count = snapshot.size;
        document.getElementById('product-count').textContent = count + ' product' + (count !== 1 ? 's' : '');
      });
    }

    window.deleteProduct = async function(id) {
      if (!confirm('Delete this product?')) return;
      try { await deleteDoc(doc(db, 'products', id)); }
      catch(e) { alert('Error deleting: ' + e.message); }
    };

    /* ─── Orders ─────────────────────────────────────────────────── */
    function loadOrders() {
      const container = document.getElementById('all-orders-list');
      const noOrders  = document.getElementById('no-orders-msg');
      container.innerHTML = '<p style="color:#6b6b6b; padding:20px;">Loading orders...</p>';

      onSnapshot(collection(db, 'orders'), (snapshot) => {
        container.innerHTML = '';

        if (snapshot.empty) { noOrders.style.display = 'block'; return; }
        noOrders.style.display = 'none';

        const allOrders = [];
        snapshot.forEach(d => allOrders.push({ firestoreId: d.id, ...d.data() }));
        allOrders.sort((a, b) => b.createdAt - a.createdAt);

        allOrders.forEach(order => {
          const safeOrderId = escapeHtml(order.id || '—');
          const safeDate = escapeHtml(order.date || '—');
          const safeEmail = escapeHtml(order.email || '—');
          const safePhone = escapeHtml(order.phone || '—');
          const safeAddress = escapeHtml(order.address || '—');
          const safeItems = Array.isArray(order.items)
            ? escapeHtml(order.items.map(i => `${i.name || 'Item'} x${Number(i.qty) || 1}`).join(', '))
            : '—';
          const safeTotal = Number(order.total) || 0;
          const safeStatus = ['Processing', 'Confirmed', 'Shipped', 'Delivered', 'Cancelled'].includes(order.status)
            ? order.status
            : 'Processing';
          const safeStatusLabel = escapeHtml(safeStatus);
          const safeFirestoreId = escapeJsString(order.firestoreId || '');

          const div = document.createElement('div');
          div.style.cssText = 'background:#fafafa; padding:24px 30px; margin-bottom:16px; display:grid; grid-template-columns:1fr auto; gap:20px; align-items:start;';
          div.innerHTML = `
            <div>
              <p style="font-size:0.75rem; letter-spacing:2px; text-transform:uppercase; color:#6b6b6b; margin-bottom:6px;">
                Order #${safeOrderId} — ${safeDate}
              </p>
              <p style="font-family:'Playfair Display',serif; font-size:1rem; margin-bottom:4px;">
                ${safeItems}
              </p>
              <p style="color:#c8a97e; font-weight:500; margin-bottom:4px;">₹${safeTotal.toLocaleString('en-IN')}</p>
              <p style="font-size:0.82rem; color:#6b6b6b;">📧 ${safeEmail}</p>
              <p style="font-size:0.82rem; color:#6b6b6b;">📞 ${safePhone}</p>
              <p style="font-size:0.82rem; color:#6b6b6b;">📍 ${safeAddress}</p>
            </div>
            <div style="display:flex; flex-direction:column; align-items:flex-end; gap:12px;">
              <select onchange="updateOrderStatus('${safeFirestoreId}', this.value)"
                style="padding:10px 16px; border:1px solid #e8e4e0; background:white;
                       font-family:'DM Sans',sans-serif; font-size:0.8rem; outline:none; cursor:pointer;">
                <option value="Processing" ${safeStatus==='Processing'?'selected':''}>Processing</option>
                <option value="Confirmed"  ${safeStatus==='Confirmed' ?'selected':''}>Confirmed</option>
                <option value="Shipped"    ${safeStatus==='Shipped'   ?'selected':''}>Shipped</option>
                <option value="Delivered"  ${safeStatus==='Delivered' ?'selected':''}>Delivered</option>
                <option value="Cancelled"  ${safeStatus==='Cancelled' ?'selected':''}>Cancelled</option>
              </select>
              <span style="font-size:0.7rem; letter-spacing:2px; text-transform:uppercase;
                           padding:6px 14px; background:${getStatusColor(safeStatus)}; color:white;">
                ${safeStatusLabel}
              </span>
            </div>
          `;
          container.appendChild(div);
        });
      });
    }

    /* ─── INPUT VALIDATION ───────────────────────────────────────── */
    /**
     * Comprehensive input validation to prevent injection attacks and data corruption
     */
    const VALIDATORS = {
      productName: (value) => {
        const trimmed = String(value || '').trim();
        if (!trimmed) return { valid: false, error: 'Product name is required' };
        if (trimmed.length > 100) return { valid: false, error: 'Product name must be 100 characters or less' };
        if (!/^[a-zA-Z0-9\s\-&(),\.]+$/.test(trimmed)) {
          return { valid: false, error: 'Product name contains invalid characters' };
        }
        return { valid: true, value: trimmed };
      },
      
      price: (value) => {
        const num = parseFloat(value);
        if (isNaN(num) || num < 0) return { valid: false, error: 'Price must be a positive number' };
        if (num > 999999) return { valid: false, error: 'Price cannot exceed ₹999,999' };
        return { valid: true, value: num };
      },
      
      description: (value) => {
        const trimmed = String(value || '').trim();
        if (trimmed.length > 500) return { valid: false, error: 'Description must be 500 characters or less' };
        // Remove any HTML tags that might have been pasted
        const clean = trimmed.replace(/<[^>]*>/g, '');
        return { valid: true, value: clean };
      },
      
      stock: (value) => {
        const num = parseInt(value);
        if (isNaN(num) || num < 0) return { valid: false, error: 'Stock must be a non-negative number' };
        if (num > 10000) return { valid: false, error: 'Stock cannot exceed 10,000 units' };
        return { valid: true, value: num };
      },
      
      category: (value, allowedValues) => {
        if (!allowedValues.includes(value)) {
          return { valid: false, error: 'Invalid category selected' };
        }
        return { valid: true, value };
      },
      
      imageUrl: (value) => {
        const trimmed = String(value || '').trim();
        if (!trimmed) return { valid: false, error: 'Image is required' };
        try {
          new URL(trimmed);
          if (!trimmed.startsWith('https://')) {
            return { valid: false, error: 'Image URL must use HTTPS' };
          }
          return { valid: true, value: trimmed };
        } catch {
          return { valid: false, error: 'Invalid image URL' };
        }
      }
    };

    function showValidationError(message) {
      const errorEl = document.createElement('div');
      errorEl.style.cssText = 'background:#fdf0f0; color:#c0392b; padding:12px 16px; border-radius:4px; margin-bottom:16px; font-size:0.85rem;';
      errorEl.textContent = '⚠️ ' + message;
      
      const addBtn = document.querySelector('.add-btn');
      if (addBtn && addBtn.parentNode) {
        addBtn.parentNode.insertBefore(errorEl, addBtn);
        setTimeout(() => errorEl.remove(), 4000);
      }
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/\"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function escapeJsString(value) {
      return String(value ?? '')
        .replace(/\\/g, '\\\\')
        .replace(/'/g, "\\'")
        .replace(/\n/g, ' ')
        .replace(/\r/g, ' ');
    }

    function getStatusColor(s) {
      return { Processing:'#6b6b6b', Confirmed:'#c8a97e', Shipped:'#2980b9', Delivered:'#2d7a2d', Cancelled:'#c0392b' }[s] || '#6b6b6b';
    }

    window.updateOrderStatus = async function(firestoreId, newStatus) {
      try { await updateDoc(doc(db, 'orders', firestoreId), { status: newStatus }); }
      catch(e) { alert('Error updating: ' + e.message); }
    };
  </script>

</body>
